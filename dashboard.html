        // Icon components
        const IconHeart = () => (

        const IconFire = () => (
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fillRule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633z" clipRule="evenodd" />

        const IconCalendar = () => (

        const IconBell = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />

        );

        const IconMenu = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        );

        const IconSearch = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        );

        const IconX = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // Stat Card Component
        const StatCard = ({ icon: Icon, label, value, color }) => (
            <div className="bg-slate-900 rounded-lg p-6 border border-slate-800">
                <div className="flex items-center justify-between">
                    <div>
                        <p className="text-slate-400 text-sm font-medium">{label}</p>
                        <p className={`text-3xl font-bold mt-2 ${color}`}>{value}</p>
                    </div>
                    <div className={`text-3xl opacity-20 ${color}`}>
                        <Icon />
                    </div>
                </div>
            </div>
        );

        // Alert Item Component
        const AlertItem = ({ item, urgencyColor }) => (
            <div className={`flex items-start gap-4 p-4 rounded-lg border ${urgencyColor}`}>
                <div className="flex-shrink-0 mt-1">
                    <div className={`w-3 h-3 rounded-full ${urgencyColor.includes('red') ? 'bg-red-500' : urgencyColor.includes('orange') ? 'bg-orange-500' : urgencyColor.includes('yellow') ? 'bg-yellow-500' : 'bg-blue-500'}`}></div>
                </div>
                <div className="flex-grow">
                    <p className="font-semibold text-slate-100">{item.dog}</p>
                    <p className="text-sm text-slate-400">{item.event}</p>
                    <p className="text-xs text-slate-500 mt-1">{item.date} â¢ {item.daysUntil} days â¢ {item.breeder}</p>
                </div>
            </div>
        );

        // Dashboard View
        const DashboardView = () => (
            <div className="space-y-8">
                {/* Stats Row */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <StatCard icon={IconHeart} label="Active Dams" value="24" color="text-emerald-400" />
                    <StatCard icon={IconFire} label="Pregnant" value="3" color="text-amber-400" />
                    <StatCard icon={IconBaby} label="Nursing" value="2" color="text-blue-400" />
                    <StatCard icon={IconCalendar} label="Upcoming Heats" value="3" color="text-yellow-400" />
                </div>

                {/* Action Items */}
                <div>
                    <h2 className="text-2xl font-bold text-slate-100 mb-4">Action Items</h2>
                    <div className="space-y-3">
                        {actionItems.map((item, idx) => {
                            let urgencyColor = '';
                            if (item.urgency === 'Critical') urgencyColor = 'bg-red-950 border-red-700';
                            else if (item.urgency === 'High') urgencyColor = 'bg-orange-950 border-orange-700';
                            else if (item.urgency === 'Medium') urgencyColor = 'bg-yellow-950 border-yellow-700';
                            else urgencyColor = 'bg-blue-950 border-blue-700';

                            return <AlertItem key={idx} item={item} urgencyColor={urgencyColor} />;
                        })}
                    </div>
                </div>

                {/* Litter Pipeline */}
                <div>
                    <h2 className="text-2xl font-bold text-slate-100 mb-4">Litter Pipeline</h2>
                    <div className="space-y-4">
                        {litterPipeline.map((litter, idx) => (
                            <div key={idx} className="bg-slate-900 rounded-lg p-6 border border-slate-800">
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <p className="font-semibold text-slate-100">{litter.dog}</p>
                                        <p className="text-sm text-slate-400">Bred: {litter.bred} â¢ Due: {litter.due}</p>
                                    </div>
                                    <span className="text-xs bg-teal-900 text-teal-200 px-2 py-1 rounded">{litter.breeder}</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
                                    <div className="bg-gradient-to-r from-emerald-500 to-teal-400 h-full" style={{width: `${litter.progressPercent}%`}}></div>
                                </div>
                                <p className="text-xs text-slate-400 mt-2">{litter.progressPercent}% complete</p>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Nursing Litters */}
                <div>
                    <h2 className="text-2xl font-bold text-slate-100 mb-4">Nursing Litters</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {nursingLitters.map((litter, idx) => (
                            <div key={idx} className="bg-slate-900 rounded-lg p-6 border border-slate-800">

                                    <div>
                                        <p className="font-semibold text-slate-100">{litter.dog}</p>

                                    </div>
                                    <span className="text-xs bg-blue-900 text-blue-200 px-2 py-1 rounded">{litter.breeder}</span>
                                </div>
                                <div className="space-y-2">

                        </div>

        // Dog Row Component
        const DogRow = ({ dog, expanded, onToggle }) => (

                        <p className="text-sm text-slate-400">{dog.nextEvent}</p>
                    </div>
                    <div className="flex items-center gap-3">
                        <span className={`text-xs px-3 py-1 rounded-full font-semibold
                            ${dog.status === 'Pregnant' ? 'bg-amber-900 text-amber-200' :
                              dog.status === 'Nursing' ? 'bg-blue-900 text-blue-200' :
                              dog.status === 'Open' ? 'bg-emerald-900 text-emerald-200' :
                              dog.status === 'Retired' ? 'bg-slate-700 text-slate-200' :
                              'bg-purple-900 text-purple-200'}`}>
                            {dog.status}
                        </span>

                {expanded && (
                    <div className="bg-slate-800 p-4 border-t border-slate-700 text-sm">

                            {dog.guardian && <div><p className="text-slate-400">Guardian</p><p className="text-slate-100 font-semibold">{dog.guardian}</p></div>}
                            {dog.weight && <div><p className="text-slate-400">Weight</p><p className="text-slate-100 font-semibold">{dog.weight}</p></div>}
                            {dog.dob && <div><p className="text-slate-400">DOB</p><p className="text-slate-100 font-semibold">{dog.dob}</p></div>}
                            {dog.dueDate && <div><p className="text-slate-400">Due Date</p><p className="text-slate-100 font-semibold">{dog.dueDate}</p></div>}
                            {dog.pups && <div><p className="text-slate-400">Litter Size</p><p className="text-slate-100 font-semibold">{dog.pups}</p></div>}
                            {dog.breed && <div><p className="text-slate-400">Breed Type</p><p className="text-slate-100 font-semibold">{dog.breed}</p></div>}
                            {dog.microchip && <div className="col-span-2"><p className="text-slate-400">Microchip</p><p className="text-slate-100 font-semibold font-mono">{dog.microchip}</p></div>}
                        </div>
                    </div>
                )}
            </div>
        );

        // Dams View
        const DamsView = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterBreeder, setFilterBreeder] = useState('All');
            const [filterStatus, setFilterStatus] = useState('All');
            const [expandedDog, setExpandedDog] = useState(null);

            const allDogs = [...dogData.Spencer, ...dogData.Annie, ...dogData.Hayley];

            const filteredDogs = allDogs.filter(dog => {
                const matchesSearch = dog.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesBreeder = filterBreeder === 'All' || (
                    (filterBreeder === 'Spencer' && dogData.Spencer.includes(dog)) ||
                    (filterBreeder === 'Annie' && dogData.Annie.includes(dog)) ||
                    (filterBreeder === 'Hayley' && dogData.Hayley.includes(dog))
                );
                const matchesStatus = filterStatus === 'All' || dog.status === filterStatus;
                return matchesSearch && matchesBreeder && matchesStatus;
            });

            return (
                <div className="space-y-6">
                    {/* Search and Filters */}
                    <div className="space-y-4">
                        <div className="relative">
                            <IconSearch className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 w-5 h-5" />
                            <input
                                type="text"
                                placeholder="Search dogs..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-800 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-emerald-500"
                            />
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select
                                value={filterBreeder}
                                onChange={(e) => setFilterBreeder(e.target.value)}
                                className="px-4 py-2 bg-slate-900 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-emerald-500"
                            >
                                <option>All Breeders</option>
                                <option>Spencer</option>
                                <option>Annie</option>
                                <option>Hayley</option>
                            </select>
                            <select
                                value={filterStatus}
                                onChange={(e) => setFilterStatus(e.target.value)}
                                className="px-4 py-2 bg-slate-900 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-emerald-500"
                            >
                                <option>All Statuses</option>
                                <option>Open</option>
                                <option>Pregnant</option>
                                <option>Nursing</option>
                                <option>Retired</option>
                                <option>Too Young</option>
                            </select>
                        </div>
                    </div>

                    {/* Dogs List */}
                    <div className="space-y-3">
                        {filteredDogs.length > 0 ? (
                            filteredDogs.map(dog => (
                                <DogRow
                                    key={dog.id}
                                    dog={dog}
                                    expanded={expandedDog === dog.id}
                                    onToggle={() => setExpandedDog(expandedDog === dog.id ? null : dog.id)}
                                />
                            ))
                        ) : (
                            <div className="text-center py-12">
                                <p className="text-slate-400">No dogs found matching your filters</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Alerts View
        const AlertsView = () => {
            const groupedByUrgency = {
                Critical: actionItems.filter(i => i.urgency === 'Critical'),
                High: actionItems.filter(i => i.urgency === 'High'),
                Medium: actionItems.filter(i => i.urgency === 'Medium'),
                Low: actionItems.filter(i => i.urgency === 'Low')
            };

            const urgencyColors = {
                Critical: 'bg-red-950 border-red-700',
                High: 'bg-orange-950 border-orange-700',
                Medium: 'bg-yellow-950 border-yellow-700',
                Low: 'bg-blue-950 border-blue-700'
            };

            return (
                <div className="space-y-8">
                    {Object.entries(groupedByUrgency).map(([level, items]) => (
                        items.length > 0 && (
                            <div key={level}>
                                <h2 className="text-xl font-bold text-slate-100 mb-4">{level} Priority</h2>
                                <div className="space-y-3">
                                    {items.map((item, idx) => (
                                        <AlertItem key={idx} item={item} urgencyColor={urgencyColors[level]} />
                                    ))}
                                </div>
                            </div>
                        )
                    ))}
                </div>
            );
        };

        // Calendar View â derived events from dogs + litters
        const CalendarView = ({ user }) => {
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [viewMode, setViewMode] = useState(() => {
                // Default: month grid on desktop, agenda on mobile
                if (typeof window === 'undefined') return 'agenda';
                return window.innerWidth >= 768 ? 'month' : 'agenda';
            });
            const [cursor, setCursor] = useState(() => {
                const d = new Date();
                return { year: d.getFullYear(), month: d.getMonth() };
            });

            const isPro = user && (user.plan === 'pro' || user.plan === 'kennel');

            useEffect(() => {
                fetch('/api/litters/calendar', { credentials: 'include' })
                    .then(res => {
                        if (!res.ok) throw new Error('Failed to load calendar');
                        return res.json();
                    })
                    .then(data => {
                        setEvents(data.events || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Group events by date string for month grid lookup
            const eventsByDate = {};
            events.forEach(ev => {
                if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
                eventsByDate[ev.date].push(ev);
            });

            // Filter upcoming events for agenda (today forward)
            const todayIso = new Date().toISOString().slice(0, 10);
            const upcoming = events.filter(ev => ev.date >= todayIso);
            const past = events.filter(ev => ev.date < todayIso).slice(-5);

            // Build month grid cells (42 cells = 6 weeks)
            const firstOfMonth = new Date(cursor.year, cursor.month, 1);
            const startDayOfWeek = firstOfMonth.getDay(); // 0=Sun
            const daysInMonth = new Date(cursor.year, cursor.month + 1, 0).getDate();
            const cells = [];
            for (let i = 0; i < 42; i++) {
                const dayNum = i - startDayOfWeek + 1;
                if (dayNum < 1 || dayNum > daysInMonth) {
                    cells.push(null);
                } else {
                    const dt = new Date(cursor.year, cursor.month, dayNum);
                    const iso = dt.toISOString().slice(0, 10);
                    cells.push({ dayNum, iso, events: eventsByDate[iso] || [] });
                }
            }

            const monthName = new Date(cursor.year, cursor.month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            const prevMonth = () => setCursor(c => {
                const m = c.month - 1;
                return m < 0 ? { year: c.year - 1, month: 11 } : { year: c.year, month: m };
            });
            const nextMonth = () => setCursor(c => {
                const m = c.month + 1;
                return m > 11 ? { year: c.year + 1, month: 0 } : { year: c.year, month: m };
            });

            const formatDate = (iso) => {
                const d = new Date(iso + 'T12:00:00');
                return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            };

            return (
                <div className="space-y-6">
                    {/* Pro Sync Banner */}
                    {isPro ? (
                        <div className="bg-gradient-to-r from-emerald-950 to-teal-950 border border-emerald-800 rounded-lg p-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">ð</span>
                                <div>
                                    <p className="font-semibold text-emerald-100">Google Calendar sync available</p>
                                    <p className="text-sm text-emerald-300/80">Push heat cycles, whelp dates, and go-home dates to your Google Calendar.</p>
                                </div>
                            </div>
                            <button
                                onClick={() => alert('Google Calendar sync â coming in Phase 2')}
                                className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg transition whitespace-nowrap"
                            >
                                Connect
                            </button>
                        </div>
                    ) : (
                        <div className="bg-gradient-to-r from-slate-900 to-slate-800 border border-slate-700 rounded-lg p-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">ð</span>
                                <div>
                                    <p className="font-semibold text-slate-100">
                                        Sync with Google Calendar
                                        <span className="ml-2 px-2 py-0.5 text-xs bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-bold rounded">PRO</span>
                                    </p>
                                    <p className="text-sm text-slate-400">Auto-push heat cycles, whelp dates, and go-home dates to your Google Calendar.</p>
                                </div>
                            </div>
                            <a
                                href="/#pricing"
                                className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-semibold rounded-lg hover:from-emerald-600 hover:to-teal-600 transition whitespace-nowrap"
                            >
                                Upgrade to Pro
                            </a>
                        </div>
                    )}

                    {/* Header: month nav + view toggle */}
                    <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                        <div className="flex items-center gap-3">
                            <button onClick={prevMonth} className="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-100 transition">â</button>
                            <h2 className="text-xl font-bold text-slate-100 min-w-[180px] text-center">{monthName}</h2>
                            <button onClick={nextMonth} className="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-100 transition">â</button>
                        </div>
                        <div className="flex items-center gap-2">
                            <button
                                onClick={() => setViewMode('month')}
                                className={`px-3 py-1 rounded-lg text-sm transition ${viewMode === 'month' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                            >
                                Month
                            </button>
                            <button
                                onClick={() => setViewMode('agenda')}
                                className={`px-3 py-1 rounded-lg text-sm transition ${viewMode === 'agenda' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                            >
                                Agenda
                            </button>
                        </div>
                    </div>

                    {loading && (
                        <div className="text-center py-12 text-slate-400">Loading calendar...</div>
                    )}

                    {error && !loading && (
                        <div className="bg-red-950 border border-red-800 rounded-lg p-4 text-red-200">
                            Failed to load calendar: {error}
                        </div>
                    )}

                    {!loading && !error && events.length === 0 && (
                        <div className="text-center py-12 bg-slate-900 border border-slate-800 rounded-lg">
                            <p className="text-4xl mb-3">ð</p>
                            <p className="text-slate-300 font-semibold">No events in the next 90 days</p>
                            <p className="text-slate-500 text-sm mt-2">Add heat dates to your dams or create a litter to see events here.</p>
                        </div>
                    )}

                    {/* Month grid */}
                    {!loading && !error && events.length > 0 && viewMode === 'month' && (
                        <div className="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden">
                            <div className="grid grid-cols-7 bg-slate-800 border-b border-slate-700">
                                {weekdays.map(wd => (
                                    <div key={wd} className="p-2 text-center text-xs font-semibold text-slate-400">{wd}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7">
                                {cells.map((cell, idx) => (
                                    <div key={idx} className={`min-h-[90px] p-1 border-r border-b border-slate-800 ${cell ? 'bg-slate-900' : 'bg-slate-950/50'}`}>
                                        {cell && (
                                            <>
                                                <div className={`text-xs font-semibold mb-1 ${cell.iso === todayIso ? 'text-emerald-400' : 'text-slate-400'}`}>
                                                    {cell.dayNum}
                                                </div>
                                                <div className="space-y-0.5">
                                                    {cell.events.slice(0, 3).map(ev => (
                                                        <div key={ev.id} className={`${ev.color} text-[10px] text-white px-1 py-0.5 rounded truncate`} title={ev.title}>
                                                            {ev.dogName || ev.label}
                                                        </div>
                                                    ))}
                                                    {cell.events.length > 3 && (
                                                        <div className="text-[10px] text-slate-500">+{cell.events.length - 3} more</div>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Agenda */}
                    {!loading && !error && events.length > 0 && viewMode === 'agenda' && (
                        <div className="space-y-4">
                            {upcoming.length > 0 && (
                                <div>
                                    <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wide mb-2">Upcoming</h3>
                                    <div className="space-y-2">
                                        {upcoming.map(ev => (
                                            <div key={ev.id} className="flex items-center gap-3 bg-slate-900 border border-slate-800 rounded-lg p-3 hover:border-slate-700 transition">
                                                <div className={`w-2 h-10 ${ev.color} rounded-full flex-shrink-0`}></div>
                                                <div className="flex-grow min-w-0">
                                                    <p className="text-slate-100 font-semibold truncate">{ev.title}</p>
                                                    <p className="text-xs text-slate-500">{formatDate(ev.date)} Â· {ev.label}</p>
                                                </div>
                                                <button
                                                    disabled={!isPro}
                                                    onClick={() => isPro && alert('Google Calendar push â coming in Phase 2')}
                                                    className={`text-xs px-2 py-1 rounded transition flex-shrink-0 ${isPro ? 'bg-slate-800 text-slate-300 hover:bg-slate-700' : 'bg-slate-800/50 text-slate-600 cursor-not-allowed'}`}
                                                    title={isPro ? 'Push to Google Calendar' : 'Pro feature'}
                                                >
                                                    {isPro ? 'ð¤ Push' : 'ð Pro'}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {past.length > 0 && (
                                <div>
                                    <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-2 mt-6">Recent (past 30 days)</h3>
                                    <div className="space-y-2 opacity-60">
                                        {past.map(ev => (
                                            <div key={ev.id} className="flex items-center gap-3 bg-slate-900/50 border border-slate-800 rounded-lg p-3">
                                                <div className={`w-2 h-10 ${ev.color} rounded-full flex-shrink-0`}></div>
                                                <div className="flex-grow min-w-0">
                                                    <p className="text-slate-300 truncate">{ev.title}</p>
                                                    <p className="text-xs text-slate-500">{formatDate(ev.date)} Â· {ev.label}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Main App Component
        function BreedIQDashboard() {
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard');
            const [authState, setAuthState] = useState('loading'); // 'loading' | 'authenticated' | 'unauthenticated'
            const [user, setUser] = useState(null);

            useEffect(() => {
                fetch('/api/auth/me', { credentials: 'include' })
                    .then(res => {
                        if (!res.ok) throw new Error('Not authenticated');
                        return res.json();
                    })
                    .then(data => {
                        setUser(data.user);
                        setAuthState('authenticated');
                    })
                    .catch(() => {
                        setAuthState('unauthenticated');
                        window.location.href = '/login';
                    });
            }, []);

            const handleSignOut = async () => {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                window.location.href = '/';
            };

            if (authState === 'loading') {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                        <div className="text-center space-y-4">
                            <div className="text-4xl">ð§¬</div>
                            <p className="text-slate-400">Loading your dashboard...</p>
                        </div>
                    </div>
                );
            }

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'ð' },
                { id: 'dams', label: 'Dams', icon: 'ð' },
                { id: 'alerts', label: 'Alerts', icon: 'â ï¸' },
                { id: 'calendar', label: 'Calendar', icon: 'ð' },
                { id: 'guardians', label: 'Guardians', icon: 'ð¥' },
                { id: 'analytics', label: 'Analytics', icon: 'ð' },
                { id: 'settings', label: 'Settings', icon: 'âï¸' }
            ];

            return (
                <div className="flex h-screen bg-slate-950">
                    {/* Sidebar */}
                    <div className={`fixed md:relative inset-y-0 left-0 z-40 transform transition duration-300 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} w-64 bg-slate-900 border-r border-slate-800 flex flex-col md:translate-x-0`}>
                        {/* Logo */}
                        <div className="p-6 border-b border-slate-800">
                            <a href="/" className="flex items-center gap-2 font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">
                                <span className="text-2xl">ð§¬</span> BreedIQ
                            </a>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-grow p-4 space-y-2">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentView(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded-lg transition ${
                                        currentView === item.id
                                            ? 'bg-emerald-900 text-emerald-100'
                                            : 'text-slate-400 hover:bg-slate-800'
                                    }`}
                                >
                                    <span className="mr-3">{item.icon}</span>
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        {/* User Profile */}
                        <div className="p-4 border-t border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-emerald-500 to-teal-500 flex items-center justify-center font-bold text-slate-900">SL</div>
                                <div>
                                    <p className="text-sm font-semibold text-slate-100">Spencer Leany</p>
                                    <p className="text-xs text-slate-500">Owner/Operator</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col min-h-screen">
                        {/* Top Bar */}
                        <header className="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-30">
                            <div className="flex items-center justify-between">
                                <button
                                    onClick={() => setSidebarOpen(!sidebarOpen)}
                                    className="md:hidden text-slate-400 hover:text-slate-100 transition"
                                >
                                    {sidebarOpen ? <IconX /> : <IconMenu />}
                                </button>

                                <div className="flex-grow mx-4 hidden md:block">
                                    <div className="relative max-w-md">
                                        <IconSearch className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500 w-5 h-5" />
                                        <input
                                            type="text"
                                            placeholder="Search dogs, events..."
                                            className="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-emerald-500"
                                        />
                                    </div>
                                </div>

                                <div className="flex items-center gap-4">
                                    <button className="relative text-slate-400 hover:text-slate-100 transition">
                                        <IconBell />
                                        <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                                    </button>
                                    <button
                                        onClick={() => { window.location.href = '/dogs?add=1'; }}
                                        className="px-4 py-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-semibold rounded-lg hover:from-emerald-600 hover:to-teal-600 transition"
                                    >
                                        + Add Dog
                                    </button>
                                    <button onClick={handleSignOut} className="px-3 py-2 text-slate-400 hover:text-white border border-slate-700 rounded-lg text-sm hover:border-slate-500 transition">
                                        Sign Out
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <main className="flex-grow overflow-auto p-6">
                            <div className="max-w-7xl mx-auto">
                                {currentView === 'dashboard' && <DashboardView />}
                                {currentView === 'dams' && <DamsView />}
                                {currentView === 'alerts' && <AlertsView />}
                                {currentView === 'calendar' && <CalendarView user={user} />}
                                {(currentView === 'guardians' || currentView === 'analytics' || currentView === 'settings') && (
                                    <div className="text-center py-20">
                                        <p className="text-slate-400 text-lg">Coming soon: {navItems.find(i => i.id === currentView)?.label}</p>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* Sidebar Overlay (Mobile) */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/50 md:hidden z-30"
                            onClick={() => setSidebarOpen(false)}
                        ></div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<BreedIQDashboard />);
    </script>
</body>
</html>
