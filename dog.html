<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Profile Â· BreedIQ</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Supabase client (for storage uploads only â API uses cookies)
        // Configured in config.js if present, otherwise disabled
        let supabaseClient = null;
        try {
            if (window.BREEDIQ_SUPABASE_URL && window.BREEDIQ_SUPABASE_ANON_KEY && window.supabase) {
                supabaseClient = window.supabase.createClient(
                    window.BREEDIQ_SUPABASE_URL,
                    window.BREEDIQ_SUPABASE_ANON_KEY
                );
            }
        } catch (e) {}

        const GESTATION_DAYS = 61;

        const STATUS_OPTIONS = ['active', 'guardian', 'retired', 'sold', 'deceased'];
        const ROLE_OPTIONS = ['dam', 'stud', 'prospect'];
        const SEX_OPTIONS = ['female', 'male'];
        const HEAT_OPTIONS = ['none', 'in_heat', 'bred', 'pregnant', 'nursing'];

        const STATUS_STYLES = {
            active:   'bg-emerald-900 text-emerald-200',
            retired:  'bg-slate-700 text-slate-200',
            guardian: 'bg-purple-900 text-purple-200',
            sold:     'bg-slate-700 text-slate-200',
            deceased: 'bg-slate-800 text-slate-400'
        };

        const HEAT_STYLES = {
            none:     'bg-slate-800 text-slate-300',
            in_heat:  'bg-pink-900 text-pink-200',
            bred:     'bg-indigo-900 text-indigo-200',
            pregnant: 'bg-amber-900 text-amber-200',
            nursing:  'bg-blue-900 text-blue-200'
        };

        // âââââââââ Helpers âââââââââ
        const fmtDate = (iso) => {
            if (!iso) return 'â';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return iso;
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const ageFromDob = (dob) => {
            if (!dob) return null;
            const birth = new Date(dob);
            if (isNaN(birth.getTime())) return null;
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            if (years === 0) return `${months} months`;
            if (months === 0) return `${years} year${years === 1 ? '' : 's'}`;
            return `${years}y ${months}mo`;
        };

        const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

        // âââââââââ Schedule stats âââââââââ
        const computeScheduleStats = (dog, litters) => {
            const stats = [];
            const today = new Date();

            if (dog.role === 'dam') {
                // Next heat estimate
                if (dog.last_heat_date) {
                    const cycle = dog.avg_heat_cycle_days || 180;
                    const last = new Date(dog.last_heat_date);
                    const next = new Date(last.getTime() + cycle * 86400000);
                    const days = Math.round((next - today) / 86400000);
                    const sinceLast = daysBetween(last, today);
                    stats.push({ label: 'Last heat', value: fmtDate(dog.last_heat_date), sub: `${sinceLast} days ago` });
                    if (days >= -14) {
                        stats.push({
                            label: 'Next heat (est.)',
                            value: fmtDate(next),
                            sub: days < 0 ? `overdue ${Math.abs(days)}d` : days === 0 ? 'today' : `in ${days} days`,
                            color: days <= 14 ? 'text-emerald-400' : 'text-slate-300'
                        });
                    }
                }

                // Pregnancy progress
                if (dog.heat_status === 'pregnant') {
                    const activeLitter = (litters || []).find(l => l.status === 'pregnant' || l.status === 'bred');
                    if (activeLitter && activeLitter.breed_date) {
                        const bred = new Date(activeLitter.breed_date);
                        const due = activeLitter.due_date ? new Date(activeLitter.due_date) : new Date(bred.getTime() + GESTATION_DAYS * 86400000);
                        const daysPregnant = daysBetween(bred, today);
                        const daysToDue = daysBetween(today, due);
                        stats.push({ label: 'Bred', value: fmtDate(bred), sub: `${daysPregnant} days pregnant` });
                        stats.push({
                            label: 'Due date',
                            value: fmtDate(due),
                            sub: daysToDue < 0 ? `${Math.abs(daysToDue)}d overdue` : `in ${daysToDue} days`,
                            color: daysToDue <= 7 ? 'text-amber-400' : 'text-slate-300'
                        });
                    }
                }

                // Nursing
                if (dog.heat_status === 'nursing') {
                    const litter = (litters || []).find(l => l.status === 'nursing' || l.whelp_date);
                    if (litter && litter.whelp_date) {
                        const whelp = new Date(litter.whelp_date);
                        const days = daysBetween(whelp, today);
                        const goHome = new Date(whelp.getTime() + 56 * 86400000); // 8 weeks
                        const daysToGo = daysBetween(today, goHome);
                        stats.push({ label: 'Whelped', value: fmtDate(whelp), sub: `${days} days ago Â· ${litter.puppy_count || '?'} pups` });
                        stats.push({
                            label: 'Go-home (8wk)',
                            value: fmtDate(goHome),
                            sub: daysToGo > 0 ? `in ${daysToGo} days` : 'ready',
                            color: daysToGo <= 7 ? 'text-blue-400' : 'text-slate-300'
                        });
                    }
                }
            }

            if (dog.role === 'stud') {
                const siredCount = (litters || []).length;
                if (siredCount > 0) {
                    const last = litters[0]; // already sorted desc
                    stats.push({ label: 'Litters sired', value: String(siredCount) });
                    if (last.breed_date) {
                        stats.push({ label: 'Last breeding', value: fmtDate(last.breed_date), sub: `${daysBetween(last.breed_date, today)} days ago` });
                    }
                }
            }

            return stats;
        };

        // âââââââââ Editable field âââââââââ
        const EditField = ({ label, value, field, onSave, type = 'text', options = null, format = null, readOnly = false }) => {
            const [editing, setEditing] = useState(false);
            const [val, setVal] = useState(value || '');
            const [saving, setSaving] = useState(false);
            const inputRef = useRef(null);

            useEffect(() => { setVal(value || ''); }, [value]);

            useEffect(() => {
                if (editing && inputRef.current) {
                    inputRef.current.focus();
                    if (inputRef.current.select) inputRef.current.select();
                }
            }, [editing]);

            const commit = async () => {
                if (val === (value || '')) {
                    setEditing(false);
                    return;
                }
                setSaving(true);
                try {
                    let sendVal = val === '' ? null : val;
                    if (type === 'number' && sendVal !== null) sendVal = parseFloat(sendVal);
                    await onSave(field, sendVal);
                    setEditing(false);
                } catch (e) {
                    console.error(e);
                    alert('Save failed: ' + e.message);
                } finally {
                    setSaving(false);
                }
            };

            const cancel = () => {
                setVal(value || '');
                setEditing(false);
            };

            const displayValue = () => {
                if (value === null || value === undefined || value === '') return <span className="text-slate-600 italic">â click to add â</span>;
                if (format) return format(value);
                if (type === 'date') return fmtDate(value);
                return String(value);
            };

            if (readOnly) {
                return (
                    <div className="py-2">
                        <p className="text-xs text-slate-500 uppercase tracking-wide">{label}</p>
                        <p className="text-slate-100 mt-0.5">{displayValue()}</p>
                    </div>
                );
            }

            if (!editing) {
                return (
                    <div className="py-2 group cursor-pointer hover:bg-slate-800/50 rounded px-2 -mx-2" onClick={() => setEditing(true)}>
                        <p className="text-xs text-slate-500 uppercase tracking-wide">{label}</p>
                        <p className="text-slate-100 mt-0.5 group-hover:text-emerald-300">{displayValue()}</p>
                    </div>
                );
            }

            return (
                <div className="py-2 px-2 -mx-2 bg-slate-800/70 rounded">
                    <p className="text-xs text-slate-500 uppercase tracking-wide">{label}</p>
                    {options ? (
                        <select
                            ref={inputRef}
                            value={val}
                            onChange={(e) => setVal(e.target.value)}
                            onBlur={commit}
                            onKeyDown={(e) => { if (e.key === 'Escape') cancel(); }}
                            className="w-full mt-1 px-2 py-1 bg-slate-900 border border-emerald-600 rounded text-slate-100 focus:outline-none"
                        >
                            <option value="">â</option>
                            {options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    ) : type === 'textarea' ? (
                        <textarea
                            ref={inputRef}
                            value={val}
                            onChange={(e) => setVal(e.target.value)}
                            onBlur={commit}
                            onKeyDown={(e) => { if (e.key === 'Escape') cancel(); }}
                            rows="3"
                            className="w-full mt-1 px-2 py-1 bg-slate-900 border border-emerald-600 rounded text-slate-100 focus:outline-none"
                        />
                    ) : (
                        <input
                            ref={inputRef}
                            type={type}
                            value={val}
                            onChange={(e) => setVal(e.target.value)}
                            onBlur={commit}
                            onKeyDown={(e) => {
                                if (e.key === 'Enter') commit();
                                if (e.key === 'Escape') cancel();
                            }}
                            className="w-full mt-1 px-2 py-1 bg-slate-900 border border-emerald-600 rounded text-slate-100 focus:outline-none"
                        />
                    )}
                    {saving && <p className="text-xs text-slate-500 mt-1">saving...</p>}
                </div>
            );
        };

        // âââââââââ Section wrapper âââââââââ
        const Section = ({ title, children, cols = 2 }) => (
            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
                <h2 className="text-sm font-bold text-emerald-400 uppercase tracking-wide mb-3">{title}</h2>
                <div className={`grid grid-cols-1 ${cols === 2 ? 'md:grid-cols-2' : ''} gap-x-6`}>
                    {children}
                </div>
            </div>
        );

        // âââââââââ Photo section âââââââââ
        const PhotoSection = ({ dog, onSave }) => {
            const [uploading, setUploading] = useState(false);
            const [urlInput, setUrlInput] = useState('');
            const [showUrlInput, setShowUrlInput] = useState(false);
            const fileRef = useRef(null);

            const handleUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                if (!supabaseClient) {
                    alert('Storage not configured. Use "Paste URL" instead, or ask to set up Supabase Storage.');
                    return;
                }
                setUploading(true);
                try {
                    const ext = file.name.split('.').pop();
                    const path = `${dog.user_id}/${dog.id}-${Date.now()}.${ext}`;
                    const { data, error } = await supabaseClient.storage
                        .from('dog-photos')
                        .upload(path, file, { upsert: true });
                    if (error) throw error;
                    const { data: pub } = supabaseClient.storage.from('dog-photos').getPublicUrl(path);
                    await onSave('photo_url', pub.publicUrl);
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                } finally {
                    setUploading(false);
                }
            };

            const handleUrlSave = async () => {
                if (!urlInput) return;
                await onSave('photo_url', urlInput);
                setUrlInput('');
                setShowUrlInput(false);
            };

            return (
                <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                    <div className="aspect-square bg-slate-800 relative">
                        {dog.photo_url ? (
                            <img src={dog.photo_url} alt={dog.name} className="w-full h-full object-cover" />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center text-slate-600">
                                <svg className="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                        )}
                    </div>
                    <div className="p-4 space-y-2">
                        <input
                            ref={fileRef}
                            type="file"
                            accept="image/*"
                            onChange={handleUpload}
                            className="hidden"
                        />
                        <button
                            onClick={() => fileRef.current?.click()}
                            disabled={uploading}
                            className="w-full px-3 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 rounded text-white text-sm font-semibold"
                        >
                            {uploading ? 'Uploading...' : 'ð· Upload Photo'}
                        </button>
                        {showUrlInput ? (
                            <div className="space-y-2">
                                <input
                                    type="text"
                                    placeholder="https://..."
                                    value={urlInput}
                                    onChange={(e) => setUrlInput(e.target.value)}
                                    className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded text-slate-100 text-sm focus:outline-none focus:border-emerald-500"
                                />
                                <div className="flex gap-2">
                                    <button onClick={() => { setShowUrlInput(false); setUrlInput(''); }} className="flex-1 px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded text-xs">Cancel</button>
                                    <button onClick={handleUrlSave} className="flex-1 px-3 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-semibold">Save</button>
                                </div>
                            </div>
                        ) : (
                            <button
                                onClick={() => setShowUrlInput(true)}
                                className="w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded text-slate-300 text-sm"
                            >
                                ð Paste URL Instead
                            </button>
                        )}
                        {dog.photo_url && (
                            <button
                                onClick={() => onSave('photo_url', null)}
                                className="w-full px-3 py-1 text-slate-500 hover:text-slate-300 text-xs"
                            >
                                Remove photo
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // âââââââââ Schedule stats widget âââââââââ
        const ScheduleStats = ({ dog, litters }) => {
            const stats = useMemo(() => computeScheduleStats(dog, litters), [dog, litters]);
            if (stats.length === 0) return null;
            return (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
                    <h2 className="text-sm font-bold text-emerald-400 uppercase tracking-wide mb-3">Schedule</h2>
                    <div className="space-y-3">
                        {stats.map((s, i) => (
                            <div key={i} className="flex justify-between items-baseline border-b border-slate-800 pb-2 last:border-0 last:pb-0">
                                <div>
                                    <p className="text-xs text-slate-500 uppercase">{s.label}</p>
                                    <p className={`font-semibold ${s.color || 'text-slate-100'}`}>{s.value}</p>
                                </div>
                                {s.sub && <p className="text-xs text-slate-400">{s.sub}</p>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // âââââââââ Litter history âââââââââ
        const LitterHistory = ({ litters }) => {
            if (!litters || litters.length === 0) return null;
            return (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
                    <h2 className="text-sm font-bold text-emerald-400 uppercase tracking-wide mb-3">Litter History</h2>
                    <div className="space-y-2">
                        {litters.map(l => (
                            <div key={l.id} className="flex justify-between py-2 border-b border-slate-800 last:border-0 text-sm">
                                <div>
                                    <p className="text-slate-100">{fmtDate(l.breed_date || l.whelp_date)}</p>
                                    <p className="text-xs text-slate-500 capitalize">{l.status}</p>
                                </div>
                                <div className="text-right">
                                    {l.puppy_count && <p className="text-slate-100">{l.puppy_count} pups</p>}
                                    {l.due_date && !l.whelp_date && <p className="text-xs text-slate-500">Due {fmtDate(l.due_date)}</p>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // âââââââââ Main page âââââââââ
        function DogProfile() {
            const [dog, setDog] = useState(null);
            const [litters, setLitters] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState(null);

            const dogId = new URLSearchParams(window.location.search).get('id');

            const load = async () => {
                if (!dogId) {
                    setError('No dog ID provided');
                    setLoading(false);
                    return;
                }
                try {
                    const res = await fetch(`/api/dogs/${dogId}`, { credentials: 'include' });
                    if (res.status === 401) { window.location.href = '/login'; return; }
                    if (!res.ok) throw new Error('Dog not found');
                    const data = await res.json();
                    setDog(data.dog);
                    setLitters(data.litters || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { load(); }, []);

            const saveField = async (field, value) => {
                const res = await fetch(`/api/dogs/${dogId}`, {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: value })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Save failed');
                setDog(data.dog);
                setToast(`â Saved ${field}`);
                setTimeout(() => setToast(null), 2000);
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (error || !dog) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <p className="text-slate-400 mb-4">{error || 'Dog not found'}</p>
                            <a href="/dogs" className="text-emerald-400 hover:text-emerald-300">â Back to dogs</a>
                        </div>
                    </div>
                );
            }

            const heat = dog.heat_status && dog.heat_status !== 'none' ? dog.heat_status.replace('_', ' ') : null;
            const age = ageFromDob(dog.date_of_birth);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-6">
                                <a href="/dashboard" className="text-lg font-bold text-emerald-400">BreedIQ</a>
                                <nav className="hidden md:flex gap-4 text-sm">
                                    <a href="/dashboard" className="text-slate-400 hover:text-slate-100">Dashboard</a>
                                    <a href="/dogs" className="text-slate-400 hover:text-slate-100">Dogs</a>
                                </nav>
                            </div>
                            <a href="/dogs" className="text-sm text-slate-400 hover:text-slate-100">â All dogs</a>
                        </div>
                    </header>

                    {/* Toast */}
                    {toast && (
                        <div className="fixed top-20 right-6 bg-emerald-600 text-white px-4 py-2 rounded-lg shadow-lg z-50 text-sm font-semibold">
                            {toast}
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Name + badges */}
                        <div className="mb-6">
                            <div className="flex items-center gap-3 flex-wrap">
                                <h1 className="text-4xl font-bold">{dog.name}</h1>
                                {dog.sex && (
                                    <span className={`text-2xl ${dog.sex === 'female' ? 'text-pink-400' : 'text-blue-400'}`}>
                                        {dog.sex === 'female' ? 'â' : 'â'}
                                    </span>
                                )}
                                {dog.status && (
                                    <span className={`text-xs uppercase tracking-wide px-2 py-1 rounded-full font-semibold ${STATUS_STYLES[dog.status] || 'bg-slate-800 text-slate-300'}`}>
                                        {dog.status}
                                    </span>
                                )}
                                {heat && (
                                    <span className={`text-xs uppercase tracking-wide px-2 py-1 rounded-full font-semibold ${HEAT_STYLES[dog.heat_status] || 'bg-slate-800 text-slate-300'}`}>
                                        {heat}
                                    </span>
                                )}
                            </div>
                            {dog.call_name && dog.call_name !== dog.name && (
                                <p className="text-slate-500 mt-1">"{dog.call_name}"</p>
                            )}
                            <p className="text-slate-400 text-sm mt-1">
                                {dog.role && <span className="capitalize">{dog.role}</span>}
                                {dog.breed && <span> Â· {dog.breed}</span>}
                                {age && <span> Â· {age}</span>}
                            </p>
                        </div>

                        <p className="text-xs text-slate-500 mb-4">ð¡ Click any field below to edit it inline</p>

                        {/* Layout: photo/stats on left, details on right */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Left column */}
                            <div className="space-y-6">
                                <PhotoSection dog={dog} onSave={saveField} />
                                <ScheduleStats dog={dog} litters={litters} />
                                <LitterHistory litters={litters} />
                            </div>

                            {/* Right column */}
                            <div className="lg:col-span-2 space-y-6">
                                <Section title="Basics">
                                    <EditField label="Name" field="name" value={dog.name} onSave={saveField} />
                                    <EditField label="Call Name" field="call_name" value={dog.call_name} onSave={saveField} />
                                    <EditField label="Breed" field="breed" value={dog.breed} onSave={saveField} />
                                    <EditField label="Color" field="color" value={dog.color} onSave={saveField} />
                                    <EditField label="Date of Birth" field="date_of_birth" value={dog.date_of_birth} type="date" onSave={saveField} />
                                    <EditField label="Weight (lbs)" field="weight_lbs" value={dog.weight_lbs} type="number" onSave={saveField} />
                                </Section>

                                <Section title="Status & Role">
                                    <EditField label="Status" field="status" value={dog.status} options={STATUS_OPTIONS} onSave={saveField} />
                                    <EditField label="Role" field="role" value={dog.role} options={ROLE_OPTIONS} onSave={saveField} />
                                    <EditField label="Sex" field="sex" value={dog.sex} options={SEX_OPTIONS} onSave={saveField} />
                                    <EditField label="Heat Status" field="heat_status" value={dog.heat_status} options={HEAT_OPTIONS} onSave={saveField} />
                                </Section>

                                {dog.role === 'dam' && (
                                    <Section title="Reproduction">
                                        <EditField label="Last Heat Date" field="last_heat_date" value={dog.last_heat_date} type="date" onSave={saveField} />
                                        <EditField label="Avg Cycle (days)" field="avg_heat_cycle_days" value={dog.avg_heat_cycle_days} type="number" onSave={saveField} />
                                    </Section>
                                )}

                                <Section title="Genetics">
                                    <EditField label="Embark ID" field="embark_id" value={dog.embark_id} onSave={saveField} />
                                    <EditField label="Embark URL" field="embark_url" value={dog.embark_url} onSave={saveField} />
                                    <EditField label="COI %" field="coi_percentage" value={dog.coi_percentage} type="number" onSave={saveField} />
                                    <EditField label="Pedigree URL" field="pedigree_url" value={dog.pedigree_url} onSave={saveField} />
                                </Section>

                                <Section title="Health">
                                    <EditField
                                        label="Vet Records Current"
                                        field="vet_records_current"
                                        value={dog.vet_records_current ? 'yes' : 'no'}
                                        options={['yes', 'no']}
                                        onSave={(f, v) => saveField(f, v === 'yes')}
                                        format={(v) => v === 'yes' ? 'Yes' : 'No'}
                                    />
                                    <EditField label="Last Vet Visit" field="vet_last_visit" value={dog.vet_last_visit} type="date" onSave={saveField} />
                                </Section>

                                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
                                    <h2 className="text-sm font-bold text-emerald-400 uppercase tracking-wide mb-3">Health Notes</h2>
                                    <EditField label="Notes" field="health_notes" value={dog.health_notes} type="textarea" onSave={saveField} />
                                </div>

                                {dog.guardian && (
                                    <Section title="Guardian">
                                        <EditField readOnly label="Family" value={dog.guardian.family_name} />
                                        <EditField readOnly label="Contact" value={dog.guardian.contact_name} />
                                        <EditField readOnly label="Email" value={dog.guardian.email} />
                                        <EditField readOnly label="Phone" value={dog.guardian.phone} />
                                    </Section>
                                )}

                                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
                                    <h2 className="text-sm font-bold text-emerald-400 uppercase tracking-wide mb-3">General Notes</h2>
                                    <EditField label="Notes" field="notes" value={dog.notes} type="textarea" onSave={saveField} />
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<DogProfile />);
    </script>
</body>
</html>
