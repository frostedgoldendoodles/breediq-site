<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started — BreedIQ</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(34, 197, 94, 0.1) 100%);
        }

        .gradient-button {
            background: linear-gradient(135deg, #3b82f6 0%, #22c55e 100%);
            transition: all 0.3s ease;
        }

        .gradient-button:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 0 40px rgba(34, 197, 94, 0.2);
        }

        .spinner {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5)); }
            50% { opacity: 0.7; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.8)); }
        }

        .progress-bar {
            animation: progress-fill 5s ease-in-out forwards;
        }

        @keyframes progress-fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .drift {
            animation: drift 8s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-30px) translateX(-10px); }
            75% { transform: translateY(-10px) translateX(15px); }
        }

        .confetti-dot {
            position: fixed;
            pointer-events: none;
        }

        .dragover {
            background-color: rgba(59, 130, 246, 0.1) !important;
        }

        .file-list-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            font-size: 14px;
            color: #d1d5db;
        }

        .confidence-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .confidence-high { background-color: #22c55e; }
        .confidence-medium { background-color: #eab308; }
        .confidence-low { background-color: #f97316; }
    </style>
</head>
<body class="bg-slate-950 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function BreedIQOnboarding() {
            const [step, setStep] = useState(1);
            const [files, setFiles] = useState([]);
            const [textInput, setTextInput] = useState('');
            const [processingStep, setProcessingStep] = useState(0);
            const [progressValue, setProgressValue] = useState(0);
            const [confettiDots, setConfettiDots] = useState([]);
            const [dogCards, setDogCards] = useState([]);
            const [summary, setSummary] = useState(null);
            const [analysisError, setAnalysisError] = useState(null);
            const dragOverRef = useRef(null);

            const statusMessages = [
                'Scanning your documents...',
                'Extracting dog profiles...',
                'Mapping heat cycle patterns...',
                'Building pedigree connections...',
                'Calculating due dates and projections...',
                'Organizing guardian family data...',
                'Almost done...'
            ];

            const categories = [
                'Dog Names', 'DOBs', 'Weights', 'Heat Dates',
                'Breeding Dates', 'Stud Info', 'Litter Counts', 'Embark Links',
                'Microchips', 'Guardian Families', 'Contract Terms', 'Pedigree'
            ];

            // Run AI analysis when step 2 is entered
            const runAnalysis = async () => {
                setStep(2);
                setAnalysisError(null);
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ notes: textInput })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || 'Analysis failed');
                    }
                    setDogCards(data.dogs || []);
                    setSummary(data.summary || null);
                    setStep(3);
                } catch (err) {
                    console.error('Analysis error:', err);
                    setAnalysisError(err.message);
                    setStep(1);
                }
            };

            // Animate the processing status messages while on step 2
            useEffect(() => {
                if (step === 2) {
                    const statusInterval = setInterval(() => {
                        setProcessingStep(prev => (prev + 1) % statusMessages.length);
                    }, 1500);

                    return () => {
                        clearInterval(statusInterval);
                    };
                }
            }, [step]);

            // Confetti animation
            useEffect(() => {
                if (step === 4) {
                    const newDots = Array.from({ length: 12 }, (_, i) => ({
                        id: i,
                        left: Math.random() * 100,
                        delay: Math.random() * 0.5,
                        duration: 3 + Math.random() * 2,
                        color: ['#3b82f6', '#22c55e', '#06b6d4', '#f59e0b'][Math.floor(Math.random() * 4)]
                    }));
                    setConfettiDots(newDots);
                }
            }, [step]);

            const handleDragOver = (e) => {
                e.preventDefault();
                dragOverRef.current?.classList.add('dragover');
            };

            const handleDragLeave = () => {
                dragOverRef.current?.classList.remove('dragover');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                dragOverRef.current?.classList.remove('dragover');
                const newFiles = Array.from(e.dataTransfer.files).map(file => file.name);
                setFiles([...files, ...newFiles]);
            };

            const handleFileInput = (e) => {
                const newFiles = Array.from(e.target.files).map(file => file.name);
                setFiles([...files, ...newFiles]);
            };

            const canProceedStep1 = files.length > 0 || textInput.trim().length > 0;

            return (
                <div className="min-h-screen bg-slate-950 gradient-bg">
                    {/* Header */}
                    <div className="border-b border-slate-800 bg-slate-900/50 backdrop-blur">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <a href="/" className="flex items-center gap-2 hover:opacity-80 transition">
                                <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-green-500 rounded-lg flex items-center justify-center">
                                    <span className="text-white font-bold text-lg">ℬ</span>
                                </div>
                                <span className="font-bold text-lg text-gray-100">BreedIQ</span>
                            </a>
                            <div className="text-sm text-gray-400">
                                Step {step} of 4
                            </div>
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="bg-slate-900 border-b border-slate-800">
                        <div className="max-w-4xl mx-auto px-6 py-3">
                            <div className="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                                <div
                                    className="bg-gradient-to-r from-blue-500 to-green-500 h-full transition-all duration-500"
                                    style={{ width: `${(step / 4) * 100}%` }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="max-w-4xl mx-auto px-6 py-12">
                        {/* STEP 1: Upload Records */}
                        {step === 1 && (
                            <div className="space-y-8">
                                <div>
                                    <h1 className="text-4xl font-bold text-gray-100 mb-2">Let's get your breeding program set up</h1>
                                    <p className="text-lg text-gray-400">Upload your existing records — notes, spreadsheets, screenshots, whatever you've got. Or paste them below.</p>
                                </div>

                                {/* Drag & Drop Zone */}
                                <div
                                    ref={dragOverRef}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                    className="border-2 border-dashed border-slate-600 rounded-lg p-8 text-center cursor-pointer transition hover:border-blue-500 hover:bg-blue-500/5"
                                >
                                    <div className="flex flex-col items-center justify-center gap-3">
                                        <svg className="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4v16m8-8H4" />
                                        </svg>
                                        <div>
                                            <p className="text-gray-300 font-medium">Drag files here or click to upload</p>
                                            <p className="text-sm text-gray-500 mt-1">Any file type accepted — PDF, Excel, Images, Notes, etc.</p>
                                        </div>
                                        <label className="mt-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm text-gray-300 cursor-pointer transition">
                                            Choose Files
                                            <input type="file" multiple onChange={handleFileInput} className="hidden" />
                                        </label>
                                    </div>
                                </div>

                                {/* File List */}
                                {files.length > 0 && (
                                    <div className="space-y-2">
                                        <p className="text-sm font-medium text-gray-400">Added files:</p>
                                        <div className="flex flex-wrap gap-2">
                                            {files.map((file, idx) => (
                                                <div key={idx} className="file-list-item">
                                                    📄 {file}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Text Textarea */}
                                <div className="space-y-2">
                                    <label className="block text-sm font-medium text-gray-300">Or paste your breeding notes here:</label>
                                    <textarea
                                        value={textInput}
                                        onChange={(e) => setTextInput(e.target.value)}
                                        placeholder="Paste your breeding notes here... Apple Notes, text messages, spreadsheet data, anything works."
                                        className="w-full h-32 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none"
                                    />
                                </div>

                                {/* Categories */}
                                <div className="space-y-3">
                                    <p className="text-sm font-medium text-gray-300">What we'll extract:</p>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.map((cat, idx) => (
                                            <span key={idx} className="px-3 py-1 bg-slate-800 border border-slate-700 rounded-full text-sm text-gray-300">
                                                {cat}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* Error Message */}
                                {analysisError && (
                                    <div className="bg-red-900/20 border border-red-700/50 rounded-lg p-4">
                                        <p className="text-sm text-red-200">
                                            <span className="font-semibold">Analysis failed:</span> {analysisError}. Please try again.
                                        </p>
                                    </div>
                                )}

                                {/* CTA Button */}
                                <button
                                    onClick={runAnalysis}
                                    disabled={!canProceedStep1}
                                    className={`w-full py-3 rounded-lg font-semibold text-white transition ${
                                        canProceedStep1
                                            ? 'gradient-button cursor-pointer'
                                            : 'bg-slate-800 text-gray-500 cursor-not-allowed opacity-50'
                                    }`}
                                >
                                    Analyze My Records
                                </button>
                            </div>
                        )}

                        {/* STEP 2: AI Processing */}
                        {step === 2 && (
                            <div className="flex flex-col items-center justify-center py-20 space-y-8">
                                <div className="relative w-24 h-24">
                                    <div className="absolute inset-0 bg-gradient-to-br from-blue-500 to-green-500 rounded-lg blur-lg opacity-50"></div>
                                    <div className="relative w-24 h-24 bg-slate-900 rounded-lg flex items-center justify-center spinner pulse-glow">
                                        <span className="text-4xl">ℬ</span>
                                    </div>
                                </div>

                                <div className="text-center space-y-2">
                                    <p className="text-xl text-gray-100 font-medium h-6">
                                        {statusMessages[processingStep]}
                                    </p>
                                    <p className="text-sm text-gray-500">This usually takes a few seconds...</p>
                                </div>

                                <div className="w-full max-w-xs bg-slate-800 rounded-full h-2 overflow-hidden">
                                    <div
                                        className="progress-bar bg-gradient-to-r from-blue-500 to-green-500 h-full"
                                    ></div>
                                </div>
                            </div>
                        )}

                        {/* STEP 3: Review & Confirm */}
                        {step === 3 && (
                            <div className="space-y-8">
                                <div>
                                    <h1 className="text-4xl font-bold text-gray-100 mb-2">Here's what we found</h1>
                                </div>

                                {/* Summary Stats */}
                                {summary && (
                                    <div className="bg-slate-900 border border-slate-800 rounded-lg p-4">
                                        <p className="text-gray-300">
                                            <span className="font-semibold text-green-400">{summary.total_dogs} dog{summary.total_dogs !== 1 ? 's' : ''}</span> extracted
                                            {summary.pregnant_count > 0 && (<>, <span className="font-semibold text-blue-400">{summary.pregnant_count} currently pregnant</span></>)}
                                            {summary.nursing_count > 0 && (<>, <span className="font-semibold text-amber-400">{summary.nursing_count} nursing</span></>)}
                                            {summary.stud_count > 0 && (<>, <span className="font-semibold text-purple-400">{summary.stud_count} stud{summary.stud_count !== 1 ? 's' : ''}</span></>)}
                                            {summary.embark_linked_count > 0 && (<>, <span className="font-semibold text-cyan-400">{summary.embark_linked_count} Embark</span> profile{summary.embark_linked_count !== 1 ? 's' : ''} linked</>)}
                                        </p>
                                    </div>
                                )}

                                {/* Dog Cards */}
                                <div className="space-y-3">
                                    {dogCards.map((dog, idx) => {
                                        const dotClass = `confidence-${dog.confidence}`;
                                        return (
                                            <div key={idx} className="bg-slate-900 border border-slate-800 rounded-lg p-4 hover:border-slate-700 transition">
                                                <div className="flex items-start gap-3">
                                                    <div className={`confidence-dot ${dotClass}`}></div>
                                                    <div className="flex-1">
                                                        <h3 className="font-semibold text-gray-100">{dog.name}</h3>
                                                        <p className="text-sm text-gray-400 mt-1">{dog.info}</p>
                                                    </div>
                                                    <span className="text-xs px-2 py-1 bg-slate-800 rounded text-gray-400 whitespace-nowrap">
                                                        {dog.confidence === 'high' && '✓ High confidence'}
                                                        {dog.confidence === 'medium' && '⚠ Medium confidence'}
                                                        {dog.confidence === 'low' && '? Low confidence'}
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Missing Info Alert */}
                                {summary && summary.missing_info && summary.missing_info.length > 0 && (
                                    <div className="bg-amber-900/20 border border-amber-700/50 rounded-lg p-4">
                                        <p className="text-sm text-amber-200">
                                            <span className="font-semibold">Missing Info:</span> {summary.missing_info.join('. ')}. You can add these later from the dashboard.
                                        </p>
                                    </div>
                                )}

                                {/* Guardian Families */}
                                {summary && summary.guardian_families && summary.guardian_families.length > 0 && (
                                    <div className="space-y-2">
                                        <p className="text-sm font-medium text-gray-300">Guardian Families:</p>
                                        <div className="flex flex-wrap gap-2">
                                            {summary.guardian_families.map((gf, idx) => (
                                                <span key={idx} className="px-3 py-1 bg-slate-800 border border-slate-700 rounded-full text-sm text-gray-300">
                                                    {gf.family_name} ({gf.dog_name})
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Action Buttons */}
                                <div className="flex gap-4">
                                    <button
                                        onClick={() => {
                                            setStep(1);
                                            setFiles([]);
                                            setTextInput('');
                                        }}
                                        className="flex-1 py-3 rounded-lg font-semibold text-gray-300 border border-slate-700 hover:bg-slate-800 transition"
                                    >
                                        Start Over
                                    </button>
                                    <button
                                        onClick={() => setStep(4)}
                                        className="flex-1 py-3 rounded-lg font-semibold text-white gradient-button"
                                    >
                                        Confirm & Launch Dashboard
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 4: Success */}
                        {step === 4 && (
                            <div className="flex flex-col items-center justify-center py-12 space-y-8">
                                {/* Checkmark Animation */}
                                <div className="relative w-20 h-20">
                                    <svg className="w-20 h-20 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <circle cx="12" cy="12" r="11" strokeWidth="1.5" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4" />
                                    </svg>
                                </div>

                                {/* Confetti */}
                                {confettiDots.map(dot => (
                                    <div
                                        key={dot.id}
                                        className="confetti-dot w-2 h-2 rounded-full drift"
                                        style={{
                                            backgroundColor: dot.color,
                                            left: `${dot.left}%`,
                                            top: '100px',
                                            animation: `drift ${dot.duration}s ease-in-out infinite`,
                                            animationDelay: `${dot.delay}s`
                                        }}
                                    ></div>
                                ))}

                                {/* Text */}
                                <div className="text-center space-y-2">
                                    <h1 className="text-4xl font-bold text-gray-100">Your breeding program is live!</h1>
                                    <p className="text-gray-400">Everything is ready to go.</p>
                                </div>

                                {/* Stats */}
                                <div className="bg-slate-900 border border-slate-800 rounded-lg p-6 w-full max-w-md">
                                    <div className="space-y-2 text-sm text-gray-300">
                                        <div className="flex justify-between">
                                            <span>Dogs added:</span>
                                            <span className="font-semibold text-green-400">{summary ? summary.total_dogs : dogCards.length}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Active pregnancies tracked:</span>
                                            <span className="font-semibold text-blue-400">{summary ? summary.pregnant_count : 0}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Guardian families linked:</span>
                                            <span className="font-semibold text-cyan-400">{summary ? summary.guardian_families.length : 0}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>Embark profiles connected:</span>
                                            <span className="font-semibold text-amber-400">{summary ? summary.embark_linked_count : 0}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Action Cards */}
                                <div className="w-full space-y-3">
                                    <a
                                        href="/dashboard"
                                        className="block w-full py-3 rounded-lg font-semibold text-white gradient-button text-center transition"
                                    >
                                        Go to Dashboard
                                    </a>
                                    <button
                                        onClick={() => {
                                            setStep(1);
                                            setFiles([]);
                                            setTextInput('');
                                        }}
                                        className="w-full py-3 rounded-lg font-semibold text-gray-300 border border-slate-700 hover:bg-slate-800 transition"
                                    >
                                        Upload More Records
                                    </button>
                                    <a
                                        href="#"
                                        className="block w-full py-3 rounded-lg font-semibold text-gray-300 border border-slate-700 hover:bg-slate-800 transition text-center"
                                    >
                                        Connect Embark
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<BreedIQOnboarding />);
    </script>
</body>
</html>
